<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecipeFinder — Discover Delicious Meals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/darkmode.css" />
  <script src="js/theme.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-icon">🍳</span>
      <span class="logo-text">RecipeFinder</span>
    </div>
    <div class="nav-actions">
      <a href="pages/favourites.html" class="nav-link"><i class="ti ti-heart"></i> Favourites</a>
      <button class="theme-toggle" id="themeToggle"><i class="ti ti-moon"></i></button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">What are you craving?</p>
      <h1 class="hero-title">Find the perfect<br /><em>recipe</em> for tonight</h1>
      <p class="hero-sub">Search by dish name, ingredients you have, or explore by cuisine & diet</p>

      <!-- SEARCH BAR -->
      <div class="search-box">
        <div class="search-tabs">
          <button class="stab active" data-tab="name">By dish name</button>
          <button class="stab" data-tab="ingredients">By ingredients</button>
        </div>

        <div class="search-input-wrap" id="nameSearch">
          <i class="ti ti-search search-icon"></i>
          <input type="text" id="dishInput" placeholder="e.g. pasta, chicken curry, tacos…" autocomplete="off" />
          <button class="search-btn" id="searchBtn">Search</button>
        </div>

        <div class="search-input-wrap hidden" id="ingredientSearch">
          <i class="ti ti-leaf search-icon"></i>
          <input type="text" id="ingredientInput" placeholder="e.g. chicken, tomato, garlic…" autocomplete="off" />
          <button class="search-btn" id="ingSearchBtn">Search</button>
        </div>

        <!-- FILTERS -->
        <div class="filters">
          <div class="filter-group">
            <label>Cuisine</label>
            <select id="cuisineFilter">
              <option value="">All cuisines</option>
              <option>Italian</option><option>Mexican</option><option>Indian</option>
              <option>Chinese</option><option>Japanese</option><option>Thai</option>
              <option>French</option><option>Mediterranean</option><option>American</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Diet</label>
            <select id="dietFilter">
              <option value="">Any diet</option>
              <option>Vegetarian</option><option>Vegan</option><option>Gluten Free</option>
              <option>Keto</option><option>Paleo</option><option>Low Carb</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Max time</label>
            <select id="timeFilter">
              <option value="">Any time</option>
              <option value="15">Under 15 min</option>
              <option value="30">Under 30 min</option>
              <option value="60">Under 1 hour</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Sort by</label>
            <select id="sortFilter">
              <option value="popular">Most popular</option>
              <option value="time">Quickest</option>
              <option value="calories">Lowest cal</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- TRENDING TAGS -->
  <section class="tags-section">
    <p class="tags-label">Trending now</p>
    <div class="tags-row">
      <button class="tag" onclick="quickSearch('pasta')">🍝 Pasta</button>
      <button class="tag" onclick="quickSearch('sushi')">🍱 Sushi</button>
      <button class="tag" onclick="quickSearch('burger')">🍔 Burger</button>
      <button class="tag" onclick="quickSearch('salad')">🥗 Salad</button>
      <button class="tag" onclick="quickSearch('pizza')">🍕 Pizza</button>
      <button class="tag" onclick="quickSearch('curry')">🍛 Curry</button>
      <button class="tag" onclick="quickSearch('tacos')">🌮 Tacos</button>
      <button class="tag" onclick="quickSearch('soup')">🍲 Soup</button>
    </div>
  </section>

  <!-- RESULTS -->
  <section class="results-section">
    <div class="results-header hidden" id="resultsHeader">
      <h2 id="resultsTitle">Results</h2>
      <span id="resultsCount"></span>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">🔍</div>
      <h3>No recipes found</h3>
      <p>Try a different search or remove some filters</p>
    </div>
    <div class="loading hidden" id="loading">
      <div class="spinner"></div>
      <p>Finding delicious recipes…</p>
    </div>
  </section>

  <!-- RECIPE MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="recipeModal">
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="js/recipes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
